name: Status Page CI/CD Pipeline

# Trigger the workflow when code is pushed to the main branch
on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1 
  ECR_REPOSITORY: status-page-app
  ECS_CLUSTER: status-page-cluster
  ECS_SERVICE: status-page-service
  ECS_TASK_DEFINITION: .aws/task-definition.json
  CONTAINER_NAME: django-gunicorn-container
  S3_STATIC_BUCKET: your-static-bucket-name
  CLOUDFRONT_DIST_ID: E1XXXXXXXXXX

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # ---------------------------------------------
    # 1. CI (Continuous Integration)
    # ---------------------------------------------
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies & Run Tests
      run: |
        pip install -r requirements.txt
        # pytest (Uncomment when you have tests written!)

    # ---------------------------------------------
    # 2 & 3. Build & Packaging (AWS Auth, ECR, S3)
    # ---------------------------------------------
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push Docker Image to ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        # The Release phase: We use the GitHub commit hash (github.sha) as the version tag
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Build and Push Static Files to S3
      run: |
        python manage.py collectstatic --noinput
        aws s3 sync ./staticfiles s3://${{ env.S3_STATIC_BUCKET }}/ --delete

    # ---------------------------------------------
    # 4 & 5. Release & Deployment (ECS & CloudFront)
    # ---------------------------------------------
    - name: Render new image ID into Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: ${{ env.ECS_TASK_DEFINITION }}
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    - name: Invalidate CloudFront Cache
      run: |
        aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DIST_ID }} --paths "/*"
